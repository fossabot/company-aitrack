version: "3.9"

# Profiles:
#   docker compose --profile java up    → starts server-java only
#   docker compose --profile go   up    → starts server-go only
#   docker compose up                   → starts nothing (profiles required)

services:
  db:
    image: paradedb/paradedb:latest
    environment:
      POSTGRES_USER: aitrack
      POSTGRES_PASSWORD: aitrack_secret
      POSTGRES_DB: aitrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  server-java:
    profiles: ["java"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.server-java
    image: aitrack-server-java:latest
    ports:
      - "8080:8080"
    environment:
      AITRACK_ADMIN_KEY: "${AITRACK_ADMIN_KEY:-dev-admin-key-change-in-prod}"
      AITRACK_SECRET_KEY: "${AITRACK_SECRET_KEY:-}"
    volumes:
      - aitrack-java-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/h2-console || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  server-go:
    profiles: ["go"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.server-go
    image: aitrack-server-go:latest
    ports:
      - "8081:8080"
    environment:
      AITRACK_ADMIN_KEY: "${AITRACK_ADMIN_KEY:-dev-admin-key-change-in-prod}"
      AITRACK_SECRET_KEY: "${AITRACK_SECRET_KEY:-}"
      AITRACK_DB_PATH: "/data/aitrack.db"
    volumes:
      - aitrack-go-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/ai-track/stats || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  aitrack-java-data:
  aitrack-go-data:
  pgdata: {}
