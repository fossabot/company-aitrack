name: aitrack Release

on:
  workflow_dispatch:
    inputs:
      allow_release:
        description: "Set to 'true' to actually publish the release (default: dry-run)"
        required: false
        default: "false"
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: aitrack
            asset_name: aitrack-x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: aitrack
            asset_name: aitrack-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aitrack
            asset_name: aitrack-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: aitrack.exe
            asset_name: aitrack-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build release binary
        run: cargo build --release --manifest-path client/Cargo.toml --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp client/target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             ${{ matrix.asset_name }}

      - name: Install signing dependencies
        run: pip3 install --quiet cryptography

      - name: Sign binary with ed25519
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          python3 - <<'PYEOF'
          import os, base64
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          key_bytes   = base64.b64decode(os.environ['RELEASE_SIGNING_KEY'])
          private_key = Ed25519PrivateKey.from_private_bytes(key_bytes)
          asset       = os.environ['ASSET_NAME']
          with open(asset, 'rb') as f:
              data = f.read()
          sig_b64 = base64.b64encode(private_key.sign(data)).decode()
          with open(asset + '.sig', 'w') as f:
              f.write(sig_b64 + '\n')
          print(f"Signed {asset} -> {asset}.sig")
          PYEOF

      - name: Generate SHA-256 checksum
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sig
            ${{ matrix.asset_name }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Check allow_release guard
        id: guard
        run: |
          # On tag push, always allow. On workflow_dispatch, check input.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.allow_release }}" == "true" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dry-run mode: release NOT published. Set allow_release=true to publish."
          fi

      - name: Publish release
        if: steps.guard.outputs.allowed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
