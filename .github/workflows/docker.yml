name: aitrack Docker

on:
  workflow_dispatch:
    inputs:
      allow_publish:
        description: "Set to 'true' to publish images (default: dry-run)"
        required: false
        default: "false"
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: aitrack-client
            dockerfile: docker/Dockerfile.client
          - image: aitrack-server-java
            dockerfile: docker/Dockerfile.server-java
          - image: aitrack-server-go
            dockerfile: docker/Dockerfile.server-go

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check allow_publish guard
        id: guard
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.allow_publish }}" == "true" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dry-run: image NOT published. Set allow_publish=true to publish."
          fi

      - name: Set up QEMU
        if: steps.guard.outputs.allowed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.guard.outputs.allowed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.guard.outputs.allowed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.guard.outputs.allowed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        if: steps.guard.outputs.allowed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
