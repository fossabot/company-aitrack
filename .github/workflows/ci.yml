name: aitrack CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────

  lint-rust:
    name: Lint · Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt check
        run: cargo fmt --manifest-path client/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path client/Cargo.toml -- -D warnings

  lint-go:
    name: Lint · Go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server-go/go.sum
      - name: go vet
        run: cd server-go && go vet ./...

  # ── Docker gate builds (90% coverage enforced inside Dockerfile) ─────────────

  client:
    name: Build & gate · Rust client
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (cargo test + llvm-cov ≥ 90% gate)
        run: docker build -f docker/Dockerfile.client .

  server-java:
    name: Build & gate · Java server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (mvn verify + JaCoCo LINE ≥ 90% gate)
        run: docker build -f docker/Dockerfile.server-java .

  server-go:
    name: Build & gate · Go server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      paradedb:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_USER: aitrack
          POSTGRES_PASSWORD: aitrack_secret
          POSTGRES_DB: aitrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server-go/go.sum
      - name: Test (go test + coverage ≥ 90%)
        working-directory: server-go
        env:
          TEST_DATABASE_URL: postgres://aitrack:aitrack_secret@localhost:5432/aitrack_test?sslmode=disable
        run: |
          go test ./... -coverprofile=cover.out -covermode=atomic -count=1
          go tool cover -func=cover.out | \
            awk '/^total/{val=$NF; sub(/%$/,"",val); if(val+0 < 90.0){ print "Coverage " val "% is below 90% threshold"; exit 1 }}'
      - name: Build Docker image
        run: docker build -f docker/Dockerfile.server-go .

  e2e:
    name: E2E · Java + Go
    needs: [client, server-java, server-go]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run E2E suite (both implementations)
        run: bash e2e/run.sh both

  # ── Coverage upload to Codecov ───────────────────────────────────────────────

  coverage-rust:
    name: Coverage · Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate LCOV
        run: cargo llvm-cov --manifest-path client/Cargo.toml --lcov --output-path lcov-rust.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov-rust.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-java:
    name: Coverage · Java
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn verify (JaCoCo)
        run: cd server-java && mvn verify -q
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: server-java/target/site/jacoco/jacoco.xml
          flags: java
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-go:
    name: Coverage · Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      paradedb:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_USER: aitrack
          POSTGRES_PASSWORD: aitrack_secret
          POSTGRES_DB: aitrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server-go/go.sum
      - name: go test -coverprofile
        working-directory: server-go
        env:
          TEST_DATABASE_URL: postgres://aitrack:aitrack_secret@localhost:5432/aitrack_test?sslmode=disable
        run: go test ./... -coverprofile=go-coverage.out -covermode=atomic
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: server-go/go-coverage.out
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}
