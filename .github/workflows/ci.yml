name: aitrack CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────

  lint-rust:
    name: Lint · Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt check
        run: cargo fmt --manifest-path client/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path client/Cargo.toml -- -D warnings

  lint-go:
    name: Lint · Go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server-go/go.sum
      - name: go vet
        run: cd server-go && go vet ./...

  # ── Docker gate builds (90% coverage enforced inside Dockerfile) ─────────────

  client:
    name: Build & gate · Rust client
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (cargo test + llvm-cov ≥ 90% gate)
        run: docker build -f docker/Dockerfile.client .

  server-java:
    name: Build & gate · Java server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (mvn verify + JaCoCo LINE ≥ 90% gate)
        run: docker build -f docker/Dockerfile.server-java .

  server-go:
    name: Build & gate · Go server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (go test + cover ≥ 90% gate)
        run: docker build -f docker/Dockerfile.server-go .

  e2e:
    name: E2E · Java + Go
    needs: [client, server-java, server-go]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run E2E suite (both implementations)
        run: bash e2e/run.sh both

  # ── Coverage upload to Codecov ───────────────────────────────────────────────

  coverage-rust:
    name: Coverage · Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate LCOV
        run: cargo llvm-cov --manifest-path client/Cargo.toml --lcov --output-path lcov-rust.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov-rust.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-java:
    name: Coverage · Java
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn verify (JaCoCo)
        run: cd server-java && mvn verify -q
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: server-java/target/site/jacoco/jacoco.xml
          flags: java
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-go:
    name: Coverage · Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server-go/go.sum
      - name: go test -coverprofile
        run: cd server-go && go test ./... -coverprofile=go-coverage.out -covermode=atomic
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: server-go/go-coverage.out
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}
