spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

aitrack:
  timestamp-window-seconds: 300
  rate-limit-per-hour: 30
  repo-whitelist:
    enforce: false
    urls: []
  max-added-lines: 5000
  max-request-body-bytes: 8388608
  max-edits-per-batch: 500
  secret-key: ""
  admin-key: "test-admin-key-do-not-use-in-prod"
