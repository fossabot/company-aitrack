spring:
  datasource:
    url: jdbc:h2:file:./data/aitrack;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

server:
  port: 8080

# Switch to PostgreSQL example:
# spring:
#   datasource:
#     url: jdbc:postgresql://localhost:5432/aitrack
#     driver-class-name: org.postgresql.Driver
#     username: aitrack
#     password: secret
#   jpa:
#     database-platform: org.hibernate.dialect.PostgreSQLDialect

aitrack:
  # HMAC replay window in seconds
  timestamp-window-seconds: 300
  # Rate limit: max edits per (token_key, file_path) per hour
  rate-limit-per-hour: 30
  # Repo URL whitelist enforcement (opt-in: empty urls = whitelist disabled,
  # all repos pass step 6). Populate urls to activate; set enforce: true to
  # hard-reject non-whitelisted repos instead of soft-flagging them.
  repo-whitelist:
    enforce: false
    urls: []
      # - "git@github.com:myorg/myrepo.git"
  # Max accepted added_lines per edit
  max-added-lines: 5000
  # Maximum HTTP request body size for POST endpoints (bytes). Prevents OOM from huge payloads.
  # 8 MiB — headroom for a full 500-edit batch with large diff_hunks. Kept in sync with the Go server.
  max-request-body-bytes: 8388608
  # Maximum number of edits in a single POST /edits batch. Prevents per-batch CPU exhaustion.
  max-edits-per-batch: 500

  # AES-256-GCM key for encrypting hmac_secret at rest (Base64, must decode to 32 bytes).
  # Generate:  openssl rand -base64 32
  # REQUIRED in production. Leave blank only for local dev (falls back to plaintext storage).
  # Prefer injecting via environment variable:  AITRACK_SECRET_KEY=<value>
  secret-key: ""

  # Admin secret required in X-Admin-Key header for POST /admin/tokens.
  # REQUIRED before any deployment. Set via AITRACK_ADMIN_KEY environment variable.
  # Example:  openssl rand -hex 32
  admin-key: ""
